<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="Covers/Ximage.png">
    
    <meta name="description" content="Bas de Reus - Game Developer, showcasing projects and skills in game development.">
    <meta name="keywords" content="Bas de Reus, Game Developer, Unity, C#, C++, HTML/CSS/JS">
    <meta name="author" content="Bas de Reus">

    <title>Under Construction</title>

    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="underconstruction.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="construction-container">
        <h1>🚧 Under Construction 🚧</h1>
        <p>Sorry for the inconvenience, but this page is currently being built. Please check back later!</p>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="links">
            <p>Meanwhile, you can visit:</p>
            <a href="/">Home</a> |
            <a href="/about">About Me</a> |
            <a href="/contact">Contact</a> |
            <a href="/Miscellaneous">Miscellaneous</a> |
            <a href="/features">Features</a>
            
            <div id="github-link-container" style="margin-top: 20px; display: none;">
                <p>Or check out this project on GitHub:</p>
                <a id="github-link" href="#" target="_blank" style="font-weight: bold;">View on GitHub</a>
            </div>
            
            <!-- <br><br><br>
            <p>The project could be found on the old version:</p>
            <a href="https://www.bas-de-reus.nl/Old/All-Projects#new">Old website</a> -->
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="ProjectsData.js"></script>
    <script src="theme-toggle.js"></script>
    <script src="HtmlFetcher.js"></script>
    <script>
        // Read github parameter from URL
        const params = new URLSearchParams(window.location.search);
        const gitHubUrl = params.get('github');
        
        if (gitHubUrl) {
            const githubContainer = document.getElementById('github-link-container');
            const githubLink = document.getElementById('github-link');
            githubLink.href = gitHubUrl;
            githubContainer.style.display = 'block';
        }
    </script>
</body>
</html>
